<!DOCTYPE html>
<html>
<head>

      font-size: 16px;

      height: 18px;

      margin-top: 12px;

      color: #666;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Firefox Spoof</h1>
  <label>
    <input type="checkbox" id="toggle" />

  </div>
  <script src="popup.js"></script>

</html>
